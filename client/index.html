<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tamoom Photobooth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Tamoom Photobooth</h1>

    <video id="video" autoplay playsinline></video>

    <div id="countdown"></div>
    <div id="status">Tap Start</div>

    <button id="startBtn">Start</button>

    <canvas id="photoCanvas" hidden></canvas>
    <canvas id="stripCanvas" hidden></canvas>
  </main>

  <script src="app.js"></script>
</body>
</html>
